name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: [self-hosted, linux, tolewis-only]
    steps:
      - uses: actions/checkout@v4
      - name: Install dev deps (venv if present, else user pip)
        shell: bash
        run: |
          if [[ -x /home/tlewis/.venvs/whisper/bin/python ]]; then
            PY=/home/tlewis/.venvs/whisper/bin/python
          else
            PY=python3
            $PY -m pip install --user -q -r requirements-dev.txt Pillow
          fi
          $PY -m pip install -q pytest httpx anyio pytest-asyncio Pillow 2>/dev/null || true
          echo "PY=$PY" >> "$GITHUB_ENV"
      - name: Pytest
        shell: bash
        run: |
          PYTHONPATH=. ${PY:-python3} -m pytest tests/ -q --tb=short

  build-windows:
    needs: test-linux
    # Prefer jubiku self-hosted; fall back label set used by LE/Orchestrate hosts
    runs-on: [self-hosted, windows, tolewis-only]
    steps:
      - uses: actions/checkout@v4

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File windows\build-installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperToggle-Setup
          path: dist/WhisperToggle-Setup-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WhisperToggle-Setup-*.exe
          body: |
            ## Whisper Toggle ${{ github.ref_name }}

            **Download the attached `WhisperToggle-Setup-*.exe`, run it, done.**

            - Hotkey: **Ctrl+Shift+H** by default (reliable on Windows 11)
            - **Win+H** and live partials are optional in Settings after disabling Windows Voice Typing
            - Local Whisper on NVIDIA CUDA or CPU (Intel Iris)
            - System tray + settings GUI + branded icon

            Your voice never leaves the machine.
