name: Build Windows Installer

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-linux:
    runs-on: [self-hosted, linux, tolewis-only]
    steps:
      - uses: actions/checkout@v4
      - name: Install dev deps (isolated venv from requirements-dev.txt)
        shell: bash
        run: |
          python3 -m venv .venv-ci
          . .venv-ci/bin/activate
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements-dev.txt
      - name: Pytest
        shell: bash
        run: |
          . .venv-ci/bin/activate
          PYTHONPATH=. python -m pytest tests/ -q --tb=short

  build-windows:
    needs: test-linux
    # Only build/publish the installer for tag releases; main pushes and PRs
    # run the Linux test job above as their gate.
    if: startsWith(github.ref, 'refs/tags/')
    # Prefer jubiku self-hosted; fall back label set used by LE/Orchestrate hosts
    runs-on: [self-hosted, windows, tolewis-only]
    steps:
      - uses: actions/checkout@v4

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File windows\build-installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperToggle-Setup
          path: dist/WhisperToggle-Setup-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WhisperToggle-Setup-*.exe
          body: |
            ## Whisper Toggle ${{ github.ref_name }}

            **Download the attached `WhisperToggle-Setup-*.exe`, run it, done.**

            - Hotkey: **Ctrl+Shift+H** by default (reliable on Windows 11)
            - **Win+H** and live partials are optional in Settings after disabling Windows Voice Typing
            - Local Whisper on NVIDIA CUDA or CPU (Intel Iris)
            - Installer bundles CUDA 12 cuBLAS/cudart and validates the selected model/device before launch
            - System tray + settings GUI + branded icon

            Your voice never leaves the machine.
